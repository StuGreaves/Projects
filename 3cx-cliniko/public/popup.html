<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Incoming Call – Patient Lookup</title>
<style>
  :root {
    --bg:        #0f172a;
    --surface:   #1e293b;
    --surface2:  #273348;
    --border:    #334155;
    --accent:    #38bdf8;
    --accent2:   #818cf8;
    --green:     #34d399;
    --amber:     #fbbf24;
    --red:       #f87171;
    --text:      #f1f5f9;
    --muted:     #94a3b8;
    --radius:    10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 460px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #0c4a6e 0%, #1e293b 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .call-icon {
    width: 40px; height: 40px;
    background: var(--green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    animation: ring 1.2s ease infinite;
  }
  @keyframes ring {
    0%,100% { box-shadow: 0 0 0 0 rgba(52,211,153,.6); }
    50%      { box-shadow: 0 0 0 10px rgba(52,211,153,0); }
  }
  .call-icon svg { width:20px; height:20px; fill: #fff; }
  .header-text h1 { font-size: 15px; font-weight: 600; color: var(--text); }
  .header-text p  { font-size: 12px; color: var(--muted); margin-top: 2px; letter-spacing:.5px; }

  /* ── Body ── */
  .body { padding: 20px; }

  /* Loading */
  #loading { text-align:center; padding: 32px 0; }
  .spinner {
    width:36px; height:36px; margin: 0 auto 12px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Not found */
  #not-found { text-align:center; padding: 32px 0; }
  #not-found .icon { font-size:40px; margin-bottom:12px; }
  #not-found h2 { font-size:16px; color: var(--text); }
  #not-found p  { font-size:13px; color: var(--muted); margin-top:6px; }
  .btn {
    display:inline-block; margin-top:14px;
    padding: 8px 20px;
    background: var(--accent);
    color: #0c1929;
    border-radius: 6px;
    font-size:13px; font-weight:600;
    text-decoration:none;
    border:none; cursor:pointer;
  }
  .btn:hover { opacity:.85; }
  .btn-outline {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  /* Patient found */
  #patient { display:none; }
  .avatar {
    width:52px; height:52px; border-radius:50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:700; color:#fff; flex-shrink:0;
  }
  .patient-header {
    display:flex; align-items:center; gap:14px; margin-bottom:18px;
  }
  .patient-header h2 { font-size:18px; font-weight:700; }
  .patient-header p  { font-size:12px; color: var(--muted); margin-top:3px; }
  .badge {
    display:inline-block; padding:2px 8px;
    border-radius:20px; font-size:11px; font-weight:600;
  }
  .badge-blue  { background:#1e40af33; color:#93c5fd; border:1px solid #1e40af66; }
  .badge-green { background:#14532d33; color:#86efac; border:1px solid #14532d66; }
  .badge-amber { background:#78350f33; color:#fde68a; border:1px solid #78350f66; }
  .badge-red   { background:#7f1d1d33; color:#fca5a5; border:1px solid #7f1d1d66; }

  .section { margin-bottom:16px; }
  .section-title {
    font-size:10px; font-weight:700; letter-spacing:1.2px;
    color: var(--muted); text-transform:uppercase;
    margin-bottom:8px;
  }
  .detail-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:8px;
  }
  .detail-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
  }
  .detail-item .label { font-size:11px; color: var(--muted); }
  .detail-item .value { font-size:13px; font-weight:600; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* Appointment list */
  .appt {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 14px;
    margin-bottom:8px;
    display:flex; align-items:center; gap:12px;
  }
  .appt-date {
    text-align:center; min-width:40px;
    background: var(--bg);
    border-radius:6px; padding:4px 6px;
    border:1px solid var(--border);
  }
  .appt-date .dd { font-size:16px; font-weight:700; line-height:1; }
  .appt-date .mm { font-size:10px; color:var(--muted); }
  .appt-info { flex:1; min-width:0; }
  .appt-info .type { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .appt-info .prac { font-size:11px; color:var(--muted); margin-top:2px; }

  .footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display:flex; gap:8px;
  }
  .footer .btn { flex:1; text-align:center; }
</style>
</head>
<body>

<div class="card">
  <!-- Header -->
  <div class="header">
    <div class="call-icon">
      <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
    </div>
    <div class="header-text">
      <h1>Incoming Call</h1>
      <p id="caller-number">Identifying caller…</p>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Loading state -->
    <div id="loading">
      <div class="spinner"></div>
      <p style="color:var(--muted);font-size:13px;">Searching Cliniko…</p>
    </div>

    <!-- Not found state -->
    <div id="not-found" style="display:none">
      <div class="icon">🔍</div>
      <h2>No Patient Found</h2>
      <p>No Cliniko record matches this number.</p>
      <a id="new-patient-link" href="#" target="_blank" class="btn" style="margin-right:8px">+ New Patient</a>
      <button class="btn btn-outline" onclick="window.close()">Dismiss</button>
    </div>

    <!-- Patient found state -->
    <div id="patient">
      <div class="patient-header">
        <div class="avatar" id="avatar-initials">?</div>
        <div>
          <h2 id="pt-name">–</h2>
          <p id="pt-meta">–</p>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Patient Details</div>
        <div class="detail-grid">
          <div class="detail-item">
            <div class="label">Date of Birth</div>
            <div class="value" id="pt-dob">–</div>
          </div>
          <div class="detail-item">
            <div class="label">Gender</div>
            <div class="value" id="pt-gender">–</div>
          </div>
          <div class="detail-item" style="grid-column:1/-1">
            <div class="label">Email</div>
            <div class="value" id="pt-email">–</div>
          </div>
        </div>
      </div>

      <div class="section" id="appt-section">
        <div class="section-title">Recent / Upcoming Appointments</div>
        <div id="appt-list"></div>
      </div>
    </div>

  </div><!-- /body -->

  <!-- Footer (shown when patient found) -->
  <div class="footer" id="footer" style="display:none">
    <a id="open-cliniko" href="#" target="_blank" class="btn">Open in Cliniko</a>
    <button class="btn btn-outline" onclick="window.close()">Dismiss</button>
  </div>
</div>

<script>
const params    = new URLSearchParams(window.location.search);
const rawNumber = params.get('number') || '';

document.getElementById('caller-number').textContent = rawNumber || 'Unknown number';

function statusBadge(status) {
  const map = {
    Booked:    'badge-green',
    DNA:       'badge-red',
    Cancelled: 'badge-amber',
  };
  return `<span class="badge ${map[status] || 'badge-blue'}">${status}</span>`;
}

function formatDate(iso) {
  if (!iso) return '–';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

function formatApptDate(iso) {
  const d = new Date(iso);
  return {
    dd: d.getDate(),
    mm: d.toLocaleDateString('en-GB', { month:'short' }),
    time: d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' }),
  };
}

async function lookup() {
  if (!rawNumber) {
    showNotFound();
    return;
  }
  try {
    const res = await fetch(`/lookup?number=${encodeURIComponent(rawNumber)}`);
    const data = await res.json();
    if (data.found) showPatient(data);
    else showNotFound();
  } catch {
    showNotFound();
  }
}

function showNotFound() {
  document.getElementById('loading').style.display    = 'none';
  document.getElementById('not-found').style.display  = 'block';
  // Link to pre-fill new patient with phone number
  document.getElementById('new-patient-link').href =
    `https://app.cliniko.com/patients/new`;
}

function showPatient(data) {
  const p = data.patient;
  document.getElementById('loading').style.display  = 'none';
  document.getElementById('patient').style.display  = 'block';
  document.getElementById('footer').style.display   = 'flex';

  // Initials avatar
  const initials = `${p.firstName[0] || ''}${p.lastName[0] || ''}`.toUpperCase();
  document.getElementById('avatar-initials').textContent = initials;

  document.getElementById('pt-name').textContent  = p.fullName;
  document.getElementById('pt-dob').textContent   = formatDate(p.dob) || '–';
  document.getElementById('pt-gender').textContent = p.gender || '–';
  document.getElementById('pt-email').textContent  = p.email  || '–';

  // Meta line
  let meta = [];
  if (p.dob) {
    const age = Math.floor((Date.now() - new Date(p.dob)) / 31557600000);
    meta.push(`Age ${age}`);
  }
  if (data.allMatches > 1) meta.push(`+${data.allMatches-1} other match`);
  document.getElementById('pt-meta').textContent = meta.join(' · ') || 'Patient';

  // Appointments
  const list = document.getElementById('appt-list');
  if (data.appointments.length) {
    list.innerHTML = data.appointments.map(a => {
      const d = formatApptDate(a.startsAt);
      return `
        <div class="appt">
          <div class="appt-date">
            <div class="dd">${d.dd}</div>
            <div class="mm">${d.mm}</div>
          </div>
          <div class="appt-info">
            <div class="type">${a.type || 'Appointment'} &nbsp;${statusBadge(a.status)}</div>
            <div class="prac">${d.time}${a.practitioner ? ' · ' + a.practitioner : ''}</div>
          </div>
        </div>`;
    }).join('');
  } else {
    document.getElementById('appt-section').style.display = 'none';
  }

  document.getElementById('open-cliniko').href = p.profileUrl;
}

lookup();
</script>
</body>
</html>
